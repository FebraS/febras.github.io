<!DOCTYPE html>
<html lang="id">

<body>
<h1>Hello</h1>
<h4>This is me, Febra</h4>
<script>
function getIP() {
  fetch('https://api.ipify.org?format=json')
  .then(response => response.json())
  .then(data => {
    document.getElementById("ip").textContent = data.ip;
  })
  .catch(error => {
    console.error("Error:",error);
  });
}
getIP();
</script>
<p>Your IP Address: <span id="ip"></span></p>
</body>
</html>
